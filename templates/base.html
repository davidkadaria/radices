<!doctype html>
<html lang="{{ lang }}">

<head>
  <script>
    (function () {
      try {
        var savedTheme = localStorage.getItem("theme");
        var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var isDark = savedTheme === "dark" || (savedTheme === "system" && systemDark) || (!savedTheme && systemDark);
        document.documentElement.setAttribute("data-color-mode", isDark ? "dark" : "light");
        var themeColor = isDark ? "#0d1117" : "#ffffff";
        document.write('<meta name="theme-color" content="' + themeColor + '" id="theme-color-meta" />');
      } catch (e) { }
    })();
  </script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>{{ title }}</title>
  <meta name="description" content="{{ description }}" />
  <meta name="keywords" content="{{ keywords }}" />

  <!-- Favicons -->
  <link rel="icon" href="./icons/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32x32.png" />

  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/icon-180x180.png" />

  <!-- PWA / Android -->
  <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512x512.png" />

  <!-- Manifest -->
  <link rel="manifest" href="./manifest.json" />

  <!-- OG -->
  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{ title-short }}" />
  <meta property="og:description" content="{{ description-short }}" />
  <meta property="og:url" content="{{ site-url }}" />
  <meta property="og:image" content="{{ site-url }}social/og-1200x630.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="{{ locale }}" />
  <meta property="og:site_name" content="{{ title }}" />

  <!-- X (Twitter) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{{ title-short }}" />
  <meta name="twitter:description" content="{{ description-short }}" />
  <meta name="twitter:image" content="{{ site-url }}social/twitter-1200x630.png" />

  <!-- Canonical -->
  <link rel="canonical" href="{{ site-url }}" />

  <!-- Custom Fonts -->
  <link rel="stylesheet" href="./fonts/bpg-arial/css/bpg-arial.min.css" />
  <link rel="stylesheet" href="./fonts/bpg-arial-caps/css/bpg-arial-caps.min.css" />

  <!-- Styles -->
  <link rel="stylesheet" href="./styles/default.css" />
  <link rel="stylesheet" href="./styles/styles.css" />

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ GA-ID }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "{{ GA-ID }}");
  </script>
</head>

<body>
  <div class="markdown-style" style="max-width: 960px; margin: 0px auto 60px auto; padding: 16px">
    <main class="content">{{ content }}</main>
  </div>
  <footer class="footer">
    <div class="footer-content">

      <div class="footer-meta">
        <!-- <p>
          წინამდებარი ვებგვერდი პროექტ <strong>Rad1ces</strong>-ის ნაწილია
        </p> -->
        <p>
          ტექსტი თარგმნილია
          <a href="{{ original-link }}" target="_blank" rel="noopener noreferrer">{{ original-language }}</a>
        </p>
        <p>თარგმანის ავტორი: <b>{{ translator }}</b></p>

          </svg>

        <span class="separator">•</span>
        <div class="theme-switcher-inline">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <label for="theme-select" class="visually-hidden">რეჟიმი: </label>
          <select id="theme-select" class="minimal-select">
            <option value="light">ნათელი</option>
            <option value="dark">ბნელი</option>
            <option value="system">ავტომატური</option>
          </select>
        </div>
      </div>

      <div class="footer-social-inline">
        <a href="https://x.com/intent/tweet?url={{ site-url }}&text={{ title }}" target="_blank"
          rel="noopener noreferrer" class="minimal-icon-link" aria-label="გაზიარება X-ზე">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
          </svg>
        </a>
        <a href="https://www.facebook.com/sharer/sharer.php?u={{ site-url }}" target="_blank" rel="noopener noreferrer"
          class="minimal-icon-link" aria-label="გაზიარება Facebook-ზე">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
          </svg>
        </a>
        <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ site-url }}&title={{ title }}" target="_blank"
          rel="noopener noreferrer" class="minimal-icon-link" aria-label="გაზიარება LinkedIn-ზე">
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path
              d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" />
          </svg>
        </a>
      </div>

      <p class="footer-copyright">© {{ year }}, Rad1ces</p>
    </div>
  </footer>

  <script src="./scripts/theme.js"></script>
</body>

</html>
